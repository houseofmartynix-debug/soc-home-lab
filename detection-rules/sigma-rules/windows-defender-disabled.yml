title: Windows Defender Real-Time Protection Disabled
id: 7e1f3a86-1c4d-4d3e-9d2a-501f2d6c4b88
status: stable
description: |
  Detects PowerShell or registry changes that disable Windows Defender real-time protection.
  Adversaries commonly disable AV before delivering payloads (MITRE T1562.001).
author: SOC Home Lab
date: 2026/05/17
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_powershell:
    Image|endswith: '\powershell.exe'
    CommandLine|contains|all:
      - 'Set-MpPreference'
      - 'DisableRealtimeMonitoring'
      - '$true'
  selection_registry:
    Image|endswith: '\reg.exe'
    CommandLine|contains|all:
      - 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender'
      - 'DisableAntiSpyware'
  condition: selection_powershell or selection_registry
falsepositives:
  - Authorized administrator running a controlled GPO change
  - Endpoint migration off Defender to a third-party AV (should be ticketed)
level: high
